esphome:
  name: "chlorinator"
  friendly_name: Chlorinator
  on_boot: 
    then:
      - switch.turn_on: takeover

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf


# Enable logging
logger:
  level: DEBUG
  
# Enable Home Assistant API
api:
  encryption:
    key: "encryption_key"

ota:
  - platform: esphome
    password: "ota_password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5db

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Chlorinator Fallback Hotspot"
    password: "hotspot_password"

captive_portal:

# Intellichlor
time:
  - platform: sntp
    id: sntp_time
    timezone: Your/Timezone
    servers:
     - your.ntp.server

uart:
  id: swg_uart
  tx_pin: GPIO0          # -> RS-485 transceiver DI
  rx_pin: GPIO3          # <- RS-485 transceiver RO
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

external_components:
  - source: github://trenchcoatjedi/intellichlor
    components: [intellichlor]
    refresh: 1d

# -----------------------------------------------------------------------------
#  IntelliChlor hub
# -----------------------------------------------------------------------------
intellichlor:
  id: swg
  uart_id: swg_uart
  flow_control_pin: GPIO1   # RS-485 transciever DE bridged to RE
  time_id: sntp_time          
  update_interval: 60s

# -----------------------------------------------------------------------------
#  Writable controls
# -----------------------------------------------------------------------------
number:
  - platform: intellichlor
    intellichlor_id: swg
    swg_percent:
      name: "SWG Output %"        # chlorine generation setpoint, 0-100%
                                  # (persisted across reboots/OTA)

switch:
  - platform: intellichlor
    intellichlor_id: swg
    takeover_mode:
      name: "SWG Takeover"        # ON = ESP drives the cell; OFF = passive monitor
      id: takeover

# Boost: temporarily run the cell at 100% for a fixed time, then auto-revert to
# swg_percent. Boost only drives the cell while Takeover is ON.
select:
  - platform: intellichlor
    intellichlor_id: swg
    swg_boost:
      name: "SWG Boost"           # options: Off / 6h / 12h / 24h / 48h

button:
  - platform: intellichlor
    intellichlor_id: swg
    end_boost:
      name: "SWG End Boost"       # cancel an active boost early (same as selecting "Off")
  - platform: template
    id: sleep_button
    name: "Enter Deep Sleep"
    on_press:
      then:
        - deep_sleep.enter:
             id: dsl


deep_sleep:
  sleep_duration: 11h
  id: dsl
# -----------------------------------------------------------------------------
#  Sensors
# -----------------------------------------------------------------------------
sensor:
  - platform: intellichlor
    intellichlor_id: swg
    salt_ppm:       { name: "SWG Salt PPM" }
    water_temp:     { name: "SWG Water Temp" }   # reported in °F
    output_percent: { name: "SWG Output (actual)" }  # cell-reported generation %
    set_percent:    { name: "SWG Set Percent" }  # last commanded %
    boost_remaining: { name: "SWG Boost Remaining" }  # minutes left in an active boost
    status:         { name: "SWG Status" }
    error:          { name: "SWG Error" }        # raw alarm bitmask (see below)

# -----------------------------------------------------------------------------
#  Fault / alarm bits (decoded from the cell's status byte)
#
#  Bit positions follow the protocol spec (docs/IntelliChlor_Protocol.md §5.4).
#  NOTE: bits 3/4 (high_current / clean) diverge from some hardware captures —
#  if a real "clean cell" condition lights up "High Current" (or vice versa),
#  see AGENTS.md. The raw value is always available via the `error` sensor above.
# -----------------------------------------------------------------------------
binary_sensor:
  - platform: intellichlor
    intellichlor_id: swg
    no_flow:       { name: "SWG No Flow" }
    low_salt:      { name: "SWG Low Salt" }
    very_low_salt: { name: "SWG Very Low Salt" }
    high_current:  { name: "SWG High Current" }
    clean:         { name: "SWG Clean Cell" }
    low_volts:     { name: "SWG Low Volts" }
    low_temp:      { name: "SWG Cold Water" }
    check_pcb:     { name: "SWG Check PCB" }

# -----------------------------------------------------------------------------
#  Text sensors
# -----------------------------------------------------------------------------
text_sensor:
  - platform: intellichlor
    intellichlor_id: swg
    version:          { name: "SWG Model" }      # model string, e.g. "Intellichlor--40"
    firmware_version: { name: "SWG Firmware" }   # cell firmware, e.g. "1.8"

